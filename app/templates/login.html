<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>

<body>

    <h2>Ingreso al Sistema</h2>

    <form method="post">
        <label>Usuario</label><br>
        <input type="text" name="username" required>

        <br><br>

        <label>Contraseña</label><br>
        <input type="password" name="password" required>

        <br><br>

        <button type="submit">Ingresar</button>
    </form>

</body>

</html>
