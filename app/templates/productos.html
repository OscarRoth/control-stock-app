{% extends "base.html" %}

{% block content %}
<h2>Productos</h2>

<table border="1" cellpadding="6">
    <tr>
        <th>ID</th>
        <th>SKU</th>
        <th>Nombre</th>
        <th>Stock</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product.id }}</td>
        <td>{{ product.sku }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.stock }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
